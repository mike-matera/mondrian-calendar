<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mondrian Calendar</title>
    <style>
        :root {
            --line: black;
            --paper: white;
            --red: red;
            --blue: blue;
            --yellow: yellow;
            --ink: black;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            display: grid;
            place-items: center;
            background: white;
            color: var(--ink);
            font-family:  "Stack Sans Headline", sans-serif;
            font-weight: bold;
            padding: 0;
        }

        .canvas {
            width: 800px;
            height: 480px;
            aspect-ratio: 16 / 10;
            background: var(--line);
            padding: 10px;
            box-shadow: none;
        }

        .painting {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1.1fr 3.8fr 0.8fr 0.5fr;
            grid-template-rows: 1fr 1.35fr 0.75fr;
            gap: 10px;
            background: var(--line);
        }

        .tile {
            background: var(--paper);
            border: 0;
            min-width: 0;
            min-height: 0;
        }

        .red {
            background: var(--red);
        }

        .blue {
            background: var(--blue);
        }

        .yellow {
            background: var(--yellow);
        }

        .lightning-box {
            display: grid;
            place-items: center;
            font-size: 4rem;
            line-height: 1;
            color: black;
        }

        .lightning-box svg {
            width: 45%;
        }

        .events {
            grid-column: 2 / 4;
            grid-row: 2 / 4;
            background: var(--paper);
            padding: 0.2rem 1rem;
            overflow: auto;
        }

        .meta {
            margin: 0.25rem 0 0.8rem;
            font-size: 0.78rem;
        }

        .event-row {
            display: grid;
            grid-template-columns: 4.4rem 1fr;
            gap: 0.9rem;
            align-items: center;
            padding: 0.2rem 0 0.2rem;
        }

        .event-calendar {
            width: 4.1rem;
            border: 3px solid var(--line);
            border-radius: 0.0rem;
            background: var(--paper);
            overflow: hidden;
            line-height: 1;
        }

        .event-calendar-month {
            display: block;
            background: var(--yellow);
            color: var(--ink);
            text-align: center;
            font-size: 0.92rem;
            letter-spacing: 0.08em;
            padding: 0.32rem 0 0.26rem;
        }

        .event-calendar-day {
            display: block;
            text-align: center;
            font-size: 2rem;
            padding: 0.24rem 0 0.18rem;
        }

        .event-detail {
            min-width: 0;
            align-self: center;
        }

        .event-meta {
            display: block;
            font-size: 1.32rem;
            line-height: 1.05;
            margin-bottom: 0.04rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .events summary {
            font-size: 1.92rem;
            line-height: 1;
            display: block;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding-top: 0.02rem;
            padding-bottom: 0.22rem;
        }

        .date {
            padding: 20px;
            font-size: 2rem;
        }

        .date day {
            font-size: 3rem;
        }

        .t1 { grid-column: 1; grid-row: 1; }
        .t2 { grid-column: 2; grid-row: 1; }
        .t3 { grid-column: 3; grid-row: 1; }
        .t4 { grid-column: 4; grid-row: 1; }
        .t5 { grid-column: 1; grid-row: 2; }
        .t6 { grid-column: 4; grid-row: 2; }
        .t7 { grid-column: 1; grid-row: 3; }
        .t8 { grid-column: 4; grid-row: 3; }
        .t9 { grid-column: 2; grid-row: 3; }

        @media (max-width: 700px) {
            .canvas {
                aspect-ratio: 4 / 5;
            }

            .painting {
                grid-template-columns: 1fr 1.4fr 0.6fr;
                grid-template-rows: 0.7fr 1fr 1.7fr 0.7fr;
            }

            .events {
                grid-column: 1 / 4;
                grid-row: 3;
            }

            .t1 { grid-column: 1; grid-row: 1; }
            .t2 { grid-column: 2 / 4; grid-row: 1; }
            .t3 { grid-column: 1; grid-row: 2; }
            .t4 { grid-column: 2; grid-row: 2; }
            .t5 { grid-column: 3; grid-row: 2; }
            .t6 { grid-column: 1; grid-row: 4; }
            .t7 { grid-column: 2; grid-row: 4; }
            .t8 { grid-column: 3; grid-row: 4; }
            .t9 { display: none; }
        }
    </style>
</head>
<body>
    <main class="canvas">
        <section class="painting">
            <div class="tile yellow t1 lightning-box" aria-hidden="true">
                {% if low_battery %}
                <svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 122.88 73.17"><defs><style>.cls-1{fill:#131313;}.cls-2{fill:red;fill-rule:evenodd;}</style></defs><title>battery-low</title><path class="cls-1" d="M109.58,62.92V52.81h10.08a3.23,3.23,0,0,0,3.22-3.22v-26a3.24,3.24,0,0,0-3.22-3.22H109.58V10.25a10.21,10.21,0,0,0-3-7.24l-.2-.18a10.19,10.19,0,0,0-7-2.83H10.25A10.28,10.28,0,0,0,0,10.25V62.92a10.19,10.19,0,0,0,3,7.23H3a10.21,10.21,0,0,0,7.24,3H99.33a10.28,10.28,0,0,0,10.25-10.25Zm-6-52.67V62.92a4.23,4.23,0,0,1-4.21,4.21H10.25a4.19,4.19,0,0,1-3-1.24h0a4.21,4.21,0,0,1-1.23-3V10.25A4.23,4.23,0,0,1,10.25,6H99.33a4.2,4.2,0,0,1,2.86,1.12l.11.12a4.21,4.21,0,0,1,1.24,3Z"/><path class="cls-2" d="M36.05,60.56V12.39H15.23A2.64,2.64,0,0,0,12.62,15V58a2.61,2.61,0,0,0,2.61,2.6Z"/></svg>
                {% endif %}
            </div>
            <div class="tile date t2" aria-hidden="true">
                <day>{{ day }}</day><br>
                {{ date }}
            </div>
            <div class="tile red t3" aria-hidden="true"></div>
            <div class="tile blue t4" aria-hidden="true"></div>
            <div class="tile t5" aria-hidden="true"></div>
            <div class="tile yellow t6" aria-hidden="true"></div>
            <div class="tile blue t7" aria-hidden="true"></div>
            <div class="tile red t8" aria-hidden="true"></div>
            <div class="tile t9" aria-hidden="true"></div>
            <article class="tile events" style="overflow: hidden;">
                {% if events %}
                    {% for event in events %}
                    <event class="event-row">
                        <div class="event-calendar" aria-hidden="true">
                            <span class="event-calendar-month">{{ event.month }}</span>
                            <span class="event-calendar-day">{{ event.day }}</span>
                        </div>
                        <div class="event-detail">
                            {% if event.time %}
                            <span class="event-meta">{{ event.time }}</span>
                            {% endif %}
                            <summary>{{ event.summary }}</summary>
                        </div>
                    </event>
                    {% endfor %}
                {% else %}
                    <p>No upcoming events found.</p>
                {% endif %}
            </article>
        </section>
    </main>
</body>
</html>
